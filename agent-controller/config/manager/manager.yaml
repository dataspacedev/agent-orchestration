apiVersion: v1
kind: Namespace
metadata:
  name: agent-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-controller
  namespace: agent-system
  labels:
    app.kubernetes.io/name: agent-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-controller
    spec:
      serviceAccountName: agent-controller
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: agent-controller:latest
        imagePullPolicy: IfNotPresent
        args:
        - --leader-elect
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
