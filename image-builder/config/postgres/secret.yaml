apiVersion: v1
kind: Secret
metadata:
  name: image-builder-db
  namespace: agent-system
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: image_builder
  database_url: postgresql+asyncpg://postgres:postgres@image-builder-postgres.agent-system.svc.cluster.local:5432/image_builder
