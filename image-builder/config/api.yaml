---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-builder
  namespace: agent-system
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: image-builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-builder
    spec:
      serviceAccountName: image-builder
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: db-migrate
          image: image-builder:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: image-builder-db
                  key: database_url
            - name: K8S_IN_CLUSTER
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      containers:
        - name: image-builder
          image: image-builder:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: image-builder-db
                  key: database_url
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: REGISTRY_INSECURE
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: image-builder
  namespace: agent-system
  labels:
    app.kubernetes.io/name: image-builder
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: image-builder
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
