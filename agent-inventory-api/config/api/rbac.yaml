---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-inventory-api
  namespace: agent-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-inventory-api-role
rules:
- apiGroups:
  - agents.orchestration.io
  resources:
  - agents
  verbs:
  - get
  - create
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-inventory-api-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-inventory-api-role
subjects:
- kind: ServiceAccount
  name: agent-inventory-api
  namespace: agent-system
