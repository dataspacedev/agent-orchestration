apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-inventory-api
  namespace: agent-system
  labels:
    app.kubernetes.io/name: agent-inventory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-inventory-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-inventory-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: migrate
        image: agent-inventory-api:latest
        imagePullPolicy: IfNotPresent
        command: ["alembic", "upgrade", "head"]
        envFrom:
        - secretRef:
            name: postgres
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      containers:
      - name: api
        image: agent-inventory-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: postgres
        - configMapRef:
            name: agent-inventory-api
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-inventory-api
  namespace: agent-system
  labels:
    app.kubernetes.io/name: agent-inventory-api
spec:
  selector:
    app.kubernetes.io/name: agent-inventory-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
