<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERP Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.125rem; font-weight: 600; color: #f8fafc; letter-spacing: -0.025em; }
    header .badge {
      font-size: 0.75rem;
      color: #94a3b8;
      font-family: ui-monospace, monospace;
      background: #334155;
      border: 1px solid #475569;
      padding: 0.2rem 0.6rem;
      border-radius: 0.375rem;
    }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .notice {
      font-size: 0.75rem;
      color: #fbbf24;
      background: #2a1f0a;
      border: 1px solid #78350f;
      border-radius: 0.5rem;
      padding: 0.6rem 1rem;
      margin-bottom: 1.5rem;
    }
    .mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      overflow: hidden;
      width: fit-content;
    }
    .mode-tab {
      padding: 0.5rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #64748b;
      transition: background 0.1s, color 0.1s;
    }
    .mode-tab.active { background: #1e293b; color: #f1f5f9; }
    .mode-tab:not(:last-child) { border-right: 1px solid #334155; }
    .input-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .input-row input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input-row input::placeholder { color: #475569; }
    button.primary {
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: #6366f1;
      color: #fff;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button.primary:hover:not(:disabled) { background: #4f46e5; }
    button.primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .status {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }
    .status.loading { background: #0c2d4a; color: #7dd3fc; border: 1px solid #1d4ed8; }
    .status.error   { background: #3b1212; color: #fca5a5; border: 1px solid #7f1d1d; }
    .hidden { display: none !important; }
    .spinner {
      width: 1.125rem;
      height: 1.125rem;
      border: 2px solid #1d4ed8;
      border-top-color: #7dd3fc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .meta { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .chip {
      font-size: 0.7rem;
      font-family: ui-monospace, monospace;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.2rem 0.5rem;
      border-radius: 0.25rem;
    }
    .tabs { display: flex; border: 1px solid #334155; border-radius: 0.375rem; overflow: hidden; }
    .tab {
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #64748b;
      transition: background 0.1s, color 0.1s;
    }
    .tab.active { background: #1e293b; color: #f1f5f9; }
    .result-frame {
      width: 100%;
      height: 580px;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      background: #fff;
    }
    .result-source {
      width: 100%;
      height: 580px;
      overflow: auto;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      background: #0d1117;
      padding: 1rem;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <h1>SERP Agent</h1>
    <span class="badge">serp_search &middot; fetch_url</span>
  </header>
  <main>
    <p class="notice">
      Requests use human-like delays &mdash; expect 10&ndash;20 seconds per call.
      Set <code>SERP_PROXIES</code> to enable proxy rotation; omit it to connect directly.
    </p>

    <div class="mode-tabs">
      <button class="mode-tab active" id="modeSearch" onclick="setMode('search')">Search</button>
      <button class="mode-tab" id="modeFetch" onclick="setMode('fetch')">Fetch URL</button>
    </div>

    <div class="input-row">
      <input id="q" type="text" placeholder="python asyncio tutorial" autocomplete="off" />
      <button class="primary" id="btn" onclick="doRequest()">Search</button>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="results" class="hidden">
      <div class="result-header">
        <div class="meta">
          <span class="chip" id="inputChip"></span>
          <span class="chip" id="toolChip"></span>
          <span class="chip" id="timeChip"></span>
        </div>
        <div class="tabs">
          <button class="tab active" id="tabR" onclick="setTab('r')">Rendered</button>
          <button class="tab" id="tabS" onclick="setTab('s')">Source</button>
        </div>
      </div>
      <iframe id="frame" class="result-frame"
              sandbox="allow-same-origin allow-scripts allow-forms"
              title="Results"></iframe>
      <pre id="src" class="result-source hidden"></pre>
    </div>
  </main>

  <script>
    let _mode = 'search';

    function setMode(m) {
      _mode = m;
      document.getElementById('modeSearch').classList.toggle('active', m === 'search');
      document.getElementById('modeFetch').classList.toggle('active', m === 'fetch');
      const input = document.getElementById('q');
      const btn = document.getElementById('btn');
      if (m === 'search') {
        input.placeholder = 'python asyncio tutorial';
        input.type = 'text';
        btn.textContent = 'Search';
      } else {
        input.placeholder = 'https://example.com/article';
        input.type = 'url';
        btn.textContent = 'Fetch';
      }
      document.getElementById('results').classList.add('hidden');
      document.getElementById('status').classList.add('hidden');
      input.value = '';
      input.focus();
    }

    function setTab(t) {
      document.getElementById('tabR').classList.toggle('active', t === 'r');
      document.getElementById('tabS').classList.toggle('active', t === 's');
      document.getElementById('frame').classList.toggle('hidden', t !== 'r');
      document.getElementById('src').classList.toggle('hidden', t !== 's');
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function doRequest() {
      const value = document.getElementById('q').value.trim();
      if (!value) return;

      const isSearch = _mode === 'search';
      const btn = document.getElementById('btn');
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');

      btn.disabled = true;
      resultsEl.classList.add('hidden');
      statusEl.className = 'status loading';
      const actionLabel = isSearch ? 'Searching for' : 'Fetching';
      statusEl.innerHTML = '<div class="spinner"></div><span>' + actionLabel + ' <em>' + esc(value) + '</em>&hellip;</span>';
      statusEl.classList.remove('hidden');

      try {
        const endpoint = isSearch ? '/api/search' : '/api/fetch';
        const body = isSearch ? { query: value } : { url: value };
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || res.statusText);

        statusEl.classList.add('hidden');
        const displayValue = isSearch ? data.query : data.url;
        document.getElementById('inputChip').textContent = '"' + displayValue + '"';
        document.getElementById('toolChip').textContent = isSearch ? 'serp_search' : 'fetch_url';
        document.getElementById('timeChip').textContent = (data.elapsed_ms / 1000).toFixed(1) + 's';
        document.getElementById('frame').srcdoc = data.html;
        document.getElementById('src').textContent = data.html;
        setTab('r');
        resultsEl.classList.remove('hidden');
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.innerHTML = '<strong>Error:</strong> ' + esc(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('q').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doRequest();
    });
  </script>
</body>
</html>
