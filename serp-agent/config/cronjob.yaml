apiVersion: batch/v1
kind: CronJob
metadata:
  name: serp-agent
  namespace: agent-system
  labels:
    app.kubernetes.io/name: serp-agent
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: serp-agent
        spec:
          serviceAccountName: serp-agent
          restartPolicy: Never
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: serp-agent
            image: serp-agent:latest
            imagePullPolicy: IfNotPresent
            command: ["sh", "-c", "python -m serp_agent.agent \"$SERP_QUERY\""]
            envFrom:
            - secretRef:
                name: serp-agent
            - configMapRef:
                name: serp-agent
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: tmp
            emptyDir: {}
