apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-registry-ui
  namespace: agent-system
  labels:
    app.kubernetes.io/name: agent-registry-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-registry-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-registry-ui
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ui
        image: agent-registry-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-registry-ui
  namespace: agent-system
  labels:
    app.kubernetes.io/name: agent-registry-ui
spec:
  selector:
    app.kubernetes.io/name: agent-registry-ui
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
