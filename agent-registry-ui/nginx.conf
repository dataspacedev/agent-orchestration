worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr notice;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;

    # Redirect all temp paths to /tmp so the container can run with readOnlyRootFilesystem
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Proxy API calls to the inventory service (resolved via K8s DNS)
        location /api/ {
            proxy_pass         http://agent-inventory-api:8000/api/;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # SPA fallback — all unmatched paths serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
